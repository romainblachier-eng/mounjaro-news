baseURL = "https://mounjaronews.info/"
languageCode = "fr-FR"
title = "Mounjaro News - Actualite tirzepatide"
defaultContentLanguage = "fr"
theme = "PaperMod"

[params]
  description      = "Votre source d'information fiable sur le Mounjaro (tirzepatide) - veille quotidienne, articles sources, traduits et reformules par IA"
  description_en   = "Your trusted source for Mounjaro (tirzepatide) news - daily sourced, translated and AI-reformulated articles"
  author           = "Mounjaro News"
  beehiiv_embed_url = "https://subscribe-forms.beehiiv.com/91587c2f-9b1e-45e3-95cf-1f8ca0fe3c4b"
  coinzilla_zone_id  = ""
  adsense_publisher  = "ca-pub-4796217302525352"

  # SEO
  keywords_fr = "Mounjaro, tirzepatide, GLP-1, perte de poids, diabete type 2, obesite, Eli Lilly, actualites Mounjaro, tirzepatide France, tirzepatide actualites"
  keywords_en = "Mounjaro, tirzepatide, GLP-1, weight loss, type 2 diabetes, obesity, Eli Lilly, Mounjaro news, tirzepatide news"

  # PaperMod params
  env = "production"
  defaultTheme = "light"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  disableSpecial1stPost = true

  [params.homeInfoParams]
    Title = "Mounjaro News"
    Content = "Votre source d'information fiable sur le Mounjaro (tirzepatide)"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[params.label]
  text = "Mounjaro News"
  icon = "/favicon.svg"
  iconHeight = 24

[[menu.main]]
  identifier = "accueil"
  name = "Accueil"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "articles"
  name = "Articles"
  url = "/posts/"
  weight = 20

[[menu.main]]
  identifier = "newsletter"
  name = "Newsletter"
  url = "/#newsletter"
  weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  page    = ["HTML"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  filename   = "sitemap.xml"
  priority   = 0.8

[minify]
  minifyOutput = true
