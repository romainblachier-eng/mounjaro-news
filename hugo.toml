baseURL = "https://mounjaronews.info/"
languageCode = "fr-FR"
title = "Mounjaro News"
defaultContentLanguage = "fr"
theme = "PaperMod"

[params]
  description      = "Toute l'actualité du Mounjaro (tirzépatide) — articles reformulés et traduits chaque jour par IA"
  description_en   = "All the latest Mounjaro (tirzepatide) news — daily AI-reformulated and translated articles"
  author           = "Mounjaro News"
  beehiiv_embed_url = "https://subscribe-forms.beehiiv.com/91587c2f-9b1e-45e3-95cf-1f8ca0fe3c4b"
  coinzilla_zone_id  = ""
  adsense_publisher  = "ca-pub-4796217302525352"

  # SEO
  keywords_fr = "Mounjaro, tirzépatide, GLP-1, perte de poids, diabète type 2, obésité, Eli Lilly, actualités Mounjaro, tirzepatide France"
  keywords_en = "Mounjaro, tirzepatide, GLP-1, weight loss, type 2 diabetes, obesity, Eli Lilly, Mounjaro news"

  # PaperMod params
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  disableSpecial1stPost = true

  [params.homeInfoParams]
    Title = "Mounjaro News"
    Content = "Toute l'actualité du Mounjaro (tirzépatide) — articles reformulés et traduits chaque jour par IA"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

[params.label]
  text = "Mounjaro News"
  icon = ""
  iconHeight = 35

[[menu.main]]
  identifier = "accueil"
  name = "Accueil"
  url = "/"
  weight = 10

[[menu.main]]
  identifier = "articles"
  name = "Articles"
  url = "/posts/"
  weight = 20

[[menu.main]]
  identifier = "newsletter"
  name = "Newsletter"
  url = "/#newsletter"
  weight = 30

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 4

[outputs]
  home    = ["HTML", "RSS", "JSON"]
  page    = ["HTML"]
  section = ["HTML", "RSS"]

[sitemap]
  changefreq = "daily"
  filename   = "sitemap.xml"
  priority   = 0.8

[minify]
  minifyOutput = true
